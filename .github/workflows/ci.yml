name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check server.js for syntax errors
        run: node --check server.js

      - name: Verify server starts and /health responds
        run: |
          node server.js &
          SERVER_PID=$!
          sleep 3
          curl -f http://localhost:3000/health || exit 1
          kill $SERVER_PID
        env:
          PORT: 3000

      - name: Confirm Railway config exists
        run: test -f railway.toml && echo "railway.toml found"
