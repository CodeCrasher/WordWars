name: Deploy to Railway

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  deploy:
    # For pull_request events, only run when the PR was actually merged (not just closed)
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service aee42be7-2c7c-4bf0-9a6d-d4bcdbaa556c --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
